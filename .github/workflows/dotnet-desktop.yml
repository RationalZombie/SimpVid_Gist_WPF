name: .NET 10.0 Production Release

# 触发条件：修改为只有当创建、发布、或编辑 Release 时触发
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # 关键权限：允许 Actions 往你的 Release 页面写入并上传打包好的文件

    steps:
    # 1. 检出仓库代码
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 安装与配置 .NET 10.0 SDK
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. 还原 NuGet 依赖包
    - name: Restore Dependencies
      run: dotnet restore SimpVid_Gist_WPF.sln

    # 4. 编译项目 (Release 模式)
    - name: Build Application
      run: dotnet build SimpVid_Gist_WPF.sln --configuration Release --no-restore

    # 5. 发布并打包（生成独立可执行文件单文件）
    - name: Publish Executable
      run: |
        dotnet publish SimpVid_Gist_WPF/SimpVid_Gist_WPF.csproj `
          --configuration Release `
          --runtime win-x64 `
          --output ./publish `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:SelfContained=false `
          --no-build

    # 6. 核心步骤：直接将编译生成的 .exe 上传到触发该工作流的 Release 页面中
    - name: Upload Binary to GitHub Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./publish/SimpVid_Gist_WPF.exe # 指向编译出的程序路径（请根据你的输出文件名微调）
        asset_name: SimpVid_Gist_WPF.exe # 用户下载时看到的文件名
        tag: ${{ github.ref }}
        overwrite: true
