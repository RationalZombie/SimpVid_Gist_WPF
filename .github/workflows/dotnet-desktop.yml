name: .NET 10.0 Tag Production Release

# 1. 触发条件：修改为只有当你推送到符合 v* 格式的 tag 时触发（例如 v1.0, v2.1.3）
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # 允许自动创建或修改 Release 页面并上传文件

    steps:
    # 1. 检出代码
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 安装配置 .NET 10.0 SDK
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. 还原 NuGet 依赖
    - name: Restore Dependencies
      run: dotnet restore SimpVid_Gist_WPF.slnx

    # 4. 直接一步到位发布（解决 NETSDK1134 报错）
    # 直接对 .csproj 指定 -r 参数，.NET 会自动在内部用正确的架构先编译再打包
    - name: Publish Executable
      run: |
        dotnet publish SimpVid_Gist_WPF/SimpVid_Gist_WPF.csproj `
          --configuration Release `
          --runtime win-x64 `
          --output ./publish `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:SelfContained=false `
          --no-restore

    # 5. 自动根据你的 Tag 创建一个 GitHub Release，并将 .exe 作为附件挂载上去
    - name: Create Release and Upload Binary
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./publish/SimpVid_Gist_WPF.exe
        asset_name: SimpVid_Gist_WPF.exe
        tag: ${{ github.ref }}
        overwrite: true
        release_name: "Release ${{ github.ref_name }}" # 自动将 Tag 名作为 Release 标题
